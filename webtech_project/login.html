<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            /* background-color: whitesmoke ; */
        }
        body{
            background-image:url('https://img.freepik.com/free-photo/black-friday-sales-sign-neon-light_23-2151833076.jpg?semt=ais_incoming&w=740&q=80');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            image-rendering: crisp-edges;
            /* background-attachment: fixed; */
        }
        #form{
          display: inline;
          
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15pc 15pc ;
            
        }
        .container{
            height: 55vh;
            width: 350px;
            background-color: white;
            border-radius: 20px;
            padding-top: 10px;
            margin-right: 1000px;
            box-shadow: 0 0 10px 10px rgb(170, 104, 104) ;
        }
        #fieldset{
            border: none;
            background-color: white;

        }
        .login{
            font-size: x-large ;
            text-align: center;
            padding: 10px;
            color: rgb(223, 44, 133);
            background-color: white;
        }
        .email {
            font-size: 25px ;
            padding: 10px 5%;
            margin-top: 40px;
            background-color: white;
            color: rgb(0, 60, 255);
        }
        .password{

            font-size: 25px ;
            padding: 10px 5%;
            background-color: white;
            color: rgb(0, 60, 255);
        }
        .name{
            text-align: center;
            background-color: white;
            color: orange;
            font-size: 40px;
        }
        .name img{
            border-radius: 50%;
            height: 30px;
            width: 30px;
            border: 2px solid ;
        }
        .ep{
            height: 25px;
            border: 1.5px solid  rgb(0, 60, 255);
            border-radius: 8px;
            background-color: white;
        }
        button{
            height: 30px;
            width: 100px;
            border-radius: 10px;
            text-align: center;
            margin-left: 45px;
            margin-top: 40px;
            background-color: rgba(156, 17, 211, 0.63) ;
            color: rgba(219, 214, 214, 0.671);
            font-size: 20px;
        }
        button:hover{
            transform: scale(1.05);
            color: rgb(245, 13, 5);
        }
        .p1{
            font-size: 25px;
            padding: 40px 10px;
            color:  rgb(34, 250, 5);
            text-align: center;
            text-shadow: 1px 1px 2px red;
        }
        .p2{
            padding: 10px 10px ;
            text-align: center;
            color: rgb(82, 81, 81);
        }
       
    </style>
</head>
<body>
    <!-- <img src="https://tse2.mm.bing.net/th/id/OIP.ojM84zgMOxElcYzx5WUS5QHaCO?pid=Api&P=0&h=180" alt=""> -->

   <form id="form" >
    <section class="container">
        
        
    <fieldset id="fieldset">
        <h2 class="name"> <img src="https://tse3.mm.bing.net/th/id/OIP.uAIdUiVeZPwOLI6wros9kwHaH0?pid=Api&P=0&h=180" alt="Electronics_logo">
            Electronics </h3>
           <legend class="login"><b><u>Log In</u></b></legend>
           <br><br>
            <label for="email" class="email">Email : </label>
           <input type="email" id="email" name="Email" autocomplete="value" class="ep" placeholder="  Enter email">
           <br><br>
          
           <label for="password" class="password">Password : </label>
           <input type="password" id="password" class="ep" name="password" placeholder="  Enter password">
           <br><br>
          

           <button class="lr">Login</button>
           <button class="lr">Reset</button>
    </fieldset>
    <p class="p1">Get access to your Orders, Wishlist and Recommendations</p>
    <p class="p2">By continuing, you agree to Electronics <span style="color: rgb(0, 81, 255)"><b>Terms of Use </b></span>and <span style="color: rgb(0, 81, 255)"> <b>Privacy Policy</b>.</span></p>
    </section>
   </form>
</body>
<script src="./script/login.js"></script>
</html>
